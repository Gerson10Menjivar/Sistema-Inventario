<div class="container-fluid vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-lg border-0 rounded-4 p-4" style="max-width: 400px; width: 100%;">
    
    <div class="text-center mb-4">
      <div class="display-4 text-primary mb-2">
        <i class="bi bi-box-seam"></i> 
      </div>
      <h2 class="fw-bold text-dark">Login de Control de Inventario</h2>
      <p class="text-muted">Ingresa tus credenciales</p>
    </div>

    @if (mensajeError) {
      <div class="alert alert-danger py-2 text-center mb-3">
        {{ mensajeError }}
      </div>
    }

    <form [formGroup]="loginForm" (ngSubmit)="ingresar()">
      <div class="mb-3">
        <label class="form-label fw-semibold">Correo Electrónico</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 rounded-start-pill">
            <i class="bi bi-person text-muted"></i>
          </span>
          <input type="email" formControlName="email" class="form-control border-start-0 rounded-end-pill px-3" placeholder="admin@correo.com">
        </div>
        @if (email?.invalid && email?.touched) {
          <small class="text-danger ms-3">Ingresa un correo válido.</small>
        }
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-white border-end-0 rounded-start-pill">
            <i class="bi bi-lock text-muted"></i>
          </span>
          <input type="password" formControlName="password" class="form-control border-start-0 rounded-end-pill px-3" placeholder="••••••••">
        </div>
        @if (password?.invalid && password?.touched) {
          <small class="text-danger ms-3">La contraseña es obligatoria.</small>
        }
      </div>

      <div class="d-grid gap-2 mt-4">
        <button type="submit" class="btn btn-primary rounded-pill py-2 fw-bold shadow-sm">
          Iniciar Sesión
        </button>
      </div>
    </form>

    <div class="text-center mt-4">
      <small class="text-muted">Sistema de Control de Inventarios v1.0</small>
    </div>
  </div>
</div>
