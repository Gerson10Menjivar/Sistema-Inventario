<app-navbar></app-navbar>

<div class="container mt-4 mb-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center">
      <button routerLink="/dashboard" class="btn btn-outline-secondary rounded-circle me-3 border-0">
        ←
      </button>
      <h2 class="fw-bold mb-0">📦 Gestión de Productos</h2>
    </div>

    <button routerLink="/productos/nuevo" class="btn btn-dark rounded-pill px-4 shadow-sm">
      + Nuevo Producto
    </button>
  </div>

  <div class="card shadow-sm border-0 mb-4 bg-light">
    <div class="card-body p-3">
      <div class="row g-3 align-items-end">
        
        <div class="col-md-4">
          <label class="form-label fw-bold text-muted small">BUSCAR PRODUCTO</label>
          <div class="input-group">
            <span class="input-group-text bg-white border-end-0"><i class="bi bi-search"></i></span>
            <input type="text" class="form-control border-start-0" placeholder="Nombre del producto..." 
                   [(ngModel)]="filtroNombre" (input)="aplicarFiltros()">
          </div>
        </div>

        <div class="col-md-3">
          <label class="form-label fw-bold text-muted small">CATEGORÍA</label>
          <select class="form-select" [(ngModel)]="filtroCategoria" (change)="aplicarFiltros()">
            <option value="">Todas</option>
            <option *ngFor="let cat of categorias" [value]="cat">{{ cat }}</option>
          </select>
        </div>

        <div class="col-md-5 d-flex gap-2">
          <button class="btn btn-outline-danger w-100 fw-bold" (click)="verStockBajo()">
            ⚠️ Stock Bajo
          </button>
          <button class="btn btn-link text-secondary text-decoration-none" (click)="limpiarFiltros()">
            Limpiar
          </button>
        </div>

      </div>
    </div>
  </div>

  <div *ngIf="productosFiltrados.length === 0" class="text-center py-5 bg-white rounded-4 shadow-sm">
    <i class="bi bi-box-seam fs-1 text-muted"></i>
    <p class="text-muted mt-2">No se encontraron productos que coincidan.</p>
  </div>

  <div *ngIf="productosFiltrados.length > 0" class="table-responsive shadow-sm rounded-4 border overflow-hidden">
    <table class="table table-hover align-middle bg-white mb-0">
      <thead class="table-dark">
        <tr>
          <th class="ps-4">Producto</th>
          <th>Categoría</th>
          <th>Precio</th>
          <th>Stock Actual</th>
          <th class="text-center">Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let prod of productosFiltrados">
          <td class="ps-4">
            <div class="fw-bold text-dark">{{ prod.nombre }}</div>
            <small class="text-muted">{{ prod.desc }}</small>
          </td>
          <td>
            <span class="badge bg-info-subtle text-info border border-info rounded-pill px-3">
              {{ prod.categoria?.nombre || 'General' }}
            </span>
          </td>
          <td class="fw-bold">${{ prod.precio | number:'1.2-2' }}</td>
          <td>
            <div class="d-flex align-items-center">
              <span [class]="prod.stock < 5 ? 'badge bg-danger rounded-pill me-2' : 'fw-bold me-2'">
                {{ prod.stock }}
              </span>
              <small *ngIf="prod.stock < 5" class="text-danger fw-bold small">¡REPONER!</small>
            </div>
          </td>
          <td class="text-center">
            <div class="btn-group">
              <button [routerLink]="['/productos/editar', prod._id]" class="btn btn-sm btn-outline-primary border me-2 rounded">
                ✏️
              </button>
              <button (click)="borrar(prod._id)" class="btn btn-sm btn-outline-danger border rounded">
                🗑️
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
