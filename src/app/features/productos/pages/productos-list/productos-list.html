<div class="container mt-4">
  <h2 class="fw-bold mb-4">📦 Inventario de Productos</h2>

  <div class="row row-cols-1 row-cols-md-3 g-4">
    <div class="col" *ngFor="let p of productos">
      <div class="card h-100 border-0 shadow-sm rounded-4 hover-effect">
        <div class="card-body">
          <div class="d-flex justify-content-between mb-3">
            <span class="badge rounded-pill bg-primary bg-opacity-10 text-primary px-3">
              {{ getNombreCategoria(p.catId) }}
            </span>
            <small class="text-muted">#{{p.id}}</small>
          </div>

          <h4 class="card-title fw-bold">{{p.icono}} {{p.nombre}}</h4>
          <h3 class="fw-bold my-3 text-dark">${{p.precio}}</h3>
          
          <div [class]="p.stock < 10 ? 'text-danger' : 'text-success'" class="small fw-bold">
            <i class="bi bi-box"></i> Stock: {{p.stock}} unidades
          </div>
        </div>

        <div class="card-footer bg-white border-0 d-flex gap-2 pb-3 px-3">
          <button class="btn btn-primary btn-sm w-100 rounded-pill">✏️ Editar</button>
          <button (click)="eliminar(p.id)" class="btn btn-outline-danger btn-sm w-100 rounded-pill">🗑️ Eliminar</button>
        </div>
      </div>
    </div>
  </div>
</div>
