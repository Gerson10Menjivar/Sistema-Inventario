<div class="container mt-5 pt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          
          <h3 class="fw-bold mb-4 text-center">
            {{ id ? '✏️ Editar Producto' : '📦 Nuevo Producto' }}
          </h3>

          <form (ngSubmit)="guardar()">
            <div class="mb-3">
              <label class="form-label fw-bold">Nombre</label>
              <input type="text" name="nombre" [(ngModel)]="producto.nombre" class="form-control" placeholder="Ej: Laptop Dell" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-bold">Categoría</label>
              <select name="categoria" [(ngModel)]="producto.categoria" class="form-select" required>
                <option value="" disabled selected>Selecciona una categoría</option>
                <option *ngFor="let cat of categorias" [value]="cat._id">
                  {{ cat.nombre }}
                </option>
              </select>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Precio ($)</label>
                <input type="number" name="precio" [(ngModel)]="producto.precio" class="form-control" placeholder="0.00">
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-bold">Stock</label>
                <input type="number" name="stock" [(ngModel)]="producto.stock" class="form-control" placeholder="Cant.">
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Descripción</label>
              <textarea name="desc" [(ngModel)]="producto.desc" class="form-control" rows="2" placeholder="Breve detalle..."></textarea>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-dark btn-lg rounded-pill">
                {{ id ? 'Guardar Cambios' : 'Crear Producto' }}
              </button>
              <button type="button" routerLink="/productos" class="btn btn-link text-muted">
                Cancelar
              </button>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</div>
