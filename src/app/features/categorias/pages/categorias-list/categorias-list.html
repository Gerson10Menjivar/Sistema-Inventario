<app-navbar></app-navbar>

<div class="container mt-4 mb-5">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex align-items-center">
      <button routerLink="/dashboard" class="btn btn-outline-secondary rounded-circle me-3 shadow-sm border-0">
        ←
      </button>
      <h2 class="fw-bold mb-0 text-dark">🏷️ Gestión de Categorías</h2>
    </div>

    <button routerLink="/categorias/nuevo" class="btn btn-dark rounded-pill px-4 shadow-sm">
      + Nueva Categoría
    </button>
  </div>

  <div *ngIf="categorias.length === 0" class="text-center py-5 bg-white rounded-4 shadow-sm border">
    <i class="bi bi-tags fs-1 text-muted"></i>
    <p class="text-muted mt-2 mb-0">No se encontraron categorías cargadas. 📦</p>
  </div>

  <div *ngIf="categorias.length > 0" class="list-group shadow-sm rounded-4 overflow-hidden border">
    <div *ngFor="let cat of categorias" 
         class="list-group-item list-group-item-action d-flex justify-content-between align-items-center py-3 border-0 border-bottom">
      
      <div class="d-flex align-items-center">
        <div class="bg-primary bg-opacity-10 p-3 rounded-circle me-3">
          <span class="fs-4 text-primary">📁</span>
        </div>
        <div>
          <h6 class="mb-0 fw-bold text-dark">{{ cat.nombre }}</h6>
          <small class="text-muted d-block">{{ cat.desc || 'Sin descripción' }}</small>
        </div>
      </div>

      <div class="btn-group rounded-3 overflow-hidden">
        <button [routerLink]="['/categorias/editar', cat._id]" class="btn btn-light px-3 shadow-sm" title="Editar">
          ✏️ Editar
        </button>
      </div>
    </div>
  </div>

  <div class="mt-3 d-flex justify-content-end">
    <span class="badge bg-secondary rounded-pill px-3">
      Total: {{ categorias.length }}
    </span>
  </div>
</div>
