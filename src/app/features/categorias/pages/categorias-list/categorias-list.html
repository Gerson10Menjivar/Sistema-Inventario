<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold">🏷️ Categorías</h2>
    <button class="btn btn-dark rounded-pill shadow">+ Nueva</button>
  </div>

  <div class="list-group shadow-sm rounded-4">
    <div *ngFor="let cat of categorias" class="list-group-item d-flex justify-content-between align-items-center py-3 border-0 border-bottom">
      <div class="d-flex align-items-center">
        <span class="fs-3 me-3">{{cat.icono}}</span>
        <div>
          <h6 class="mb-0 fw-bold">{{cat.nombre}} (ID: {{cat.id}})</h6>
          <small class="text-muted">{{cat.desc}}</small>
        </div>
      </div>
      <div class="btn-group shadow-sm">
        <button class="btn btn-light border btn-sm">✏️</button>
        <button (click)="borrar(cat.id)" class="btn btn-light border btn-sm text-danger">🗑️</button>
      </div>
    </div>
  </div>
</div>
