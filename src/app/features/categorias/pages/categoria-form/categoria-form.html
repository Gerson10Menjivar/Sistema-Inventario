<div class="container mt-5 pt-5">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      
      <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-4">
          
          <div class="d-flex align-items-center mb-4">
            <button routerLink="/categorias" class="btn btn-light rounded-circle me-3 shadow-sm">
              ←
            </button>
            <h3 class="fw-bold mb-0 text-dark">Nueva Categoría</h3>
          </div>

          <p class="text-muted small mb-4">Completa la información para registrar una nueva categoría en el inventario.</p>

          <form (ngSubmit)="guardar()">
            <div class="mb-3">
              <label class="form-label fw-bold small text-uppercase text-secondary">Nombre</label>
              <input 
                type="text" 
                name="nombre"
                [(ngModel)]="categoria.nombre" 
                class="form-control form-control-lg bg-light border-0 rounded-3" 
                placeholder="Ej: Bebidas Frías"
                required>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold small text-uppercase text-secondary">Descripción</label>
              <textarea 
                name="desc"
                [(ngModel)]="categoria.desc" 
                class="form-control bg-light border-0 rounded-3" 
                rows="3" 
                placeholder="Opcional: Detalles de la categoría..."></textarea>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-dark btn-lg rounded-pill shadow-sm py-3 fw-bold">
                Guardar Categoría
              </button>
              <button type="button" routerLink="/categorias" class="btn btn-link text-muted mt-2">
                Cancelar y volver
              </button>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
